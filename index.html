<!DOCTYPE html>
<html>
<head>
  <title>Special Question</title>
  <script>
    function propose() {
      let answer = confirm("Will you marry me?")
      if(answer){
        alert("YES, I DO!");
      } else {
        alert("I CAN'T SAY NO. SO YES!!");
      }
    }
  </script>
</head>
<body>
  <h1>Click the button and you will know it!</h1>
  <button onclick="propose()">Click Me</button>
</body>
</html>
